<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>แบบทดสอบ — GemSoul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="quiz-page">

  <canvas id="starfield"></canvas>

  <nav class="navbar">
    <div class="nav-logo">✦ GemSoul</div>
    <ul class="nav-links">
      <li><a href="index.html">หน้าแรก</a></li>
      <li><a href="quiz.html" class="active">ทำแบบทดสอบ</a></li>
      <li><a href="gems.html">คลังอัญมณี</a></li>
    </ul>
    <button class="nav-toggle" onclick="toggleNav()">☰</button>
  </nav>

  <main class="quiz-wrapper">

    <!-- Intro Screen -->
    <div id="screen-intro" class="quiz-screen active">
      <div class="quiz-intro-card">
        <div class="quiz-gem-anim">💎</div>
        <h1>ค้นหาอัญมณีในตัวคุณ</h1>
        <p>ตอบคำถาม 10 ข้อด้านล่างอย่างตรงไปตรงมา ไม่มีคำตอบถูกหรือผิด เลือกตามความรู้สึกแรกของคุณเสมอ</p>
        <div class="intro-rules">
          <div class="rule"><span>📋</span> 10 คำถาม</div>
          <div class="rule"><span>⏱</span> ประมาณ 3 นาที</div>
          <div class="rule"><span>💎</span> 8 ผลลัพธ์</div>
        </div>
        <button class="btn-primary" onclick="startQuiz()">
          <span>เริ่มเลย!</span>
          <div class="btn-shine"></div>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="quiz-screen">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill"></div>
      </div>
      <div class="quiz-progress-text">
        <span id="questionNum">1</span> / 10
      </div>

      <div class="question-card" id="questionCard">
        <div class="question-tag">คำถามที่ <span id="qTag">1</span></div>
        <h2 id="questionText" class="question-text"></h2>
        <div class="options-grid" id="optionsGrid"></div>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="quiz-screen">
      <div class="result-card" id="resultCard">
        <p class="result-eyebrow">✦ คุณคืออัญมณีแห่ง ✦</p>
        <div class="result-gem-display" id="resultGemEmoji"></div>
        <h1 class="result-gem-name" id="resultGemName"></h1>
        <p class="result-gem-latin" id="resultGemLatin"></p>
        <div class="result-divider">✦ ✦ ✦</div>
        <p class="result-desc" id="resultDesc"></p>
        <div class="result-traits" id="resultTraits"></div>
        <div class="result-actions">
          <button class="btn-primary" onclick="retakeQuiz()">
            <span>ทำใหม่อีกครั้ง</span>
            <div class="btn-shine"></div>
          </button>
          <a class="btn-ghost" id="resultLearnMore" href="#">เรียนรู้เพิ่มเติม →</a>
        </div>
      </div>
    </div>

  </main>

  <script src="js/starfield.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
